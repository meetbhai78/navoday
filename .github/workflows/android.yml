name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies (for icon generator)
        run: npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          rm -f package-lock.json
          npm install
          npm install @tailwindcss/oxide-linux-x64-gnu@4.3.1 --no-save

      - name: Build Web App
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://navoday.onrender.com' }}
        run: |
          cd frontend
          npm run build

      - name: Generate Android Launcher Icons from Logo
        run: node generate-android-icons.js

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        run: |
          cd frontend
          npx cap sync android

      - name: Build Android APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: navoday-app-debug.apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

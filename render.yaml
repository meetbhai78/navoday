services:
  # Backend Web Service
  - type: web
    name: navoday-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User will input Atlas link on Render dashboard
      - key: JWT_SECRET
        sync: false # User will input secret on Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        value: daulyz7fl
      - key: CLOUDINARY_API_KEY
        value: 922436663281344
      - key: CLOUDINARY_API_SECRET
        value: rcTYG6X0QIolmq5TD5CjNHHZqPc
      - key: CLOUDINARY_URL
        value: cloudinary://922436663281344:rcTYG6X0QIolmq5TD5CjNHHZqPc@daulyz7fl

  # Frontend Static Site
  - type: web
    name: navoday-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend

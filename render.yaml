services:
  - type: web
    name: navoday
    env: node
    buildCommand: rm -f frontend/package-lock.json && npm install && cd frontend && npm install @tailwindcss/oxide-linux-x64-gnu@4.3.1 @tailwindcss/oxide-linux-x64-musl@4.3.1 --no-save && cd .. && npm run build
    startCommand: npm start
    envVars:
